# Story 0.2 — Continuous Integration gate.
#
# Runs the full L0..L3 regression matrix on every PR + on every push to main.
# Gates: lint (fmt + clippy) → supply-chain checks → unit (L0) →
# integration (L1) → bench (L3).
#
# Cited:
#   - architecture.md §11.4 (CI vs Release separation)
#   - guardrails.md G18/G22/G25
#   - nfr-thresholds.md T-22 (per-layer budgets), T-41 (aggregate ≤750s)
#   - Story 0.2 Technical Context
#
# Egress allowlist per G16: cargo (crates.io), github.com, rustsec advisories.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR — saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Avoid exFAT-style hard-link warnings on self-hosted runners; harmless on
  # github-hosted runners. Match the [profile.dev] setting in Cargo.toml.
  CARGO_INCREMENTAL: "0"

jobs:
  lint:
    name: "lint (fmt + clippy)"
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: "cargo fmt --all -- --check (T-22 budget: 60s)"
        run: cargo fmt --all -- --check
      - uses: Swatinem/rust-cache@v2
      - name: "cargo clippy --workspace --all-targets -- -D warnings (T-22 budget: 180s)"
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: "cargo deny (T-32 licenses + T-33 advisories + bans + sources)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Story 0.3 landed deny.toml — this is now a hard gate (was advisory).
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories sources

  audit:
    # RUSTSEC advisory gate. cargo-deny's `advisories` arm (in the deny job
    # below) subsumes this with the project's documented ignore list
    # (deny.toml [advisories].ignore). We keep cargo audit as a separate,
    # independent belt-and-suspenders gate — but use taiki-e/install-action
    # (instead of rustsec/audit-check@v2.0.0) because the latter builds
    # cargo-audit without --locked and breaks whenever a transitive dep bumps
    # its MSRV past the runner's rustc. Deny's ignore IDs are mirrored here as
    # --ignore flags so the two gates agree.
    name: "cargo audit (RUSTSEC advisories)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit (with deny.toml-mirrored ignores)
        # Mirror deny.toml [advisories].ignore so the two gates agree.
        # Each flag mutes one RUSTSEC ID; update both files together.
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0192 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  # Story 6.5 — LHM binary integrity gate. Offline-deterministic: validates
  # the committed `resources/LibreHardwareMonitor.exe` against the committed
  # `resources/ohm.sha256` pin via `fetch_ohm.ps1 -CheckOnly`. NO network
  # egress (G16). A hash drift on the bundled binary fails the build. Cited:
  # Story 6.5 DoD, R7 (OHM binary pin), G18 (reproducible builds).
  lhm-hash:
    name: "LHM hash gate (Story 6.5, offline -CheckOnly)"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # The bundled LHM binary is gitignored (large third-party binary); fetch
      # it into resources/ first, then -CheckOnly validates the SHA-256 pin.
      # Without this fetch step, -CheckOnly fails on a clean checkout because
      # resources/LibreHardwareMonitor.exe doesn't exist yet.
      - name: Fetch pinned LHM runtime
        shell: pwsh
        run: ./scripts/fetch_ohm.ps1
      - name: Validate bundled LHM against resources/ohm.sha256
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/fetch_ohm.ps1 -CheckOnly

  # Story 6.5 — LHM upstream fetch gate. G16 CI egress for the LHM binary
  # was approved 2026-07-13 (see verify/pending-HITL-gates.md §6.5). This
  # job downloads LHM v0.9.6 from the pinned GitHub release URL into a clean
  # temp directory and verifies the SHA-256 against resources/ohm.sha256. It
  # proves the pinned release URL still resolves and the upstream has not
  # retired the tag — the most common cause of a release-day surprise.
  # `resources/` is NOT mutated by this job (the committed binary is the
  # source of truth); the download lands in a temp staging dir that the
  # runner discards.
  lhm-fetch:
    name: "LHM upstream fetch gate (Story 6.5, G16 egress approved 2026-07-13)"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: "Download + verify pinned LHM from upstream (no resources/ mutation)"
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Reuse the script's hash + extraction logic, but stage into a
          # temp dir so the committed resources/ is never touched.
          $staging = Join-Path $env:RUNNER_TEMP 'lhm-staging'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          $zipUrl = 'https://github.com/LibreHardwareMonitor/LibreHardwareMonitor/releases/download/v0.9.6/LibreHardwareMonitor.zip'
          $zipPath = Join-Path $staging 'lhm.zip'
          Write-Host "Downloading $zipUrl"
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -TimeoutSec 30
          $extract = Join-Path $staging 'extract'
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extract -Force
          $exe = Get-ChildItem -LiteralPath $extract -Filter 'LibreHardwareMonitor.exe' -File -Recurse | Select-Object -First 1
          if (-not $exe) { throw 'Archive did not contain LibreHardwareMonitor.exe' }
          $actual = (Get-FileHash -LiteralPath $exe.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $pinLine = (Get-Content -LiteralPath resources/ohm.sha256 -TotalCount 1).Trim()
          $expected = ($pinLine -split '\s+')[0].ToLowerInvariant()
          Write-Host "  Upstream SHA-256: $actual"
          Write-Host "  Pinned   SHA-256: $expected"
          if ($actual -ne $expected) {
            throw "SHA-256 mismatch — upstream binary no longer matches the committed pin. Bump resources/ohm.sha256 (R7 HITL) or pin a different LHM release."
          }
          Write-Host "LHM upstream fetch matches the pinned hash." -ForegroundColor Green

  unit:
    name: "cargo test --workspace --lib (L0, T-40 budget: 60s)"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib

  integration:
    name: "cargo test --workspace --tests (L1, T-40 budget: 60s)"
    runs-on: windows-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The dev_env_scripts integration tests invoke scripts/verify-dev-env.ps1,
      # which asserts the full dev-env contract is present — including the
      # bundled LHM binary + sqlite3. Neither ships in the repo (both are
      # gitignored dev-side downloads per .gitignore). Populate them before
      # the test gate so CI mirrors what CONTRIBUTING.md asks of a contributor.
      - name: Fetch pinned LHM runtime (for verify-dev-env.ps1)
        shell: pwsh
        run: ./scripts/fetch_ohm.ps1
      - name: Stage sqlite3.exe into tools/sqlite/ (for verify-dev-env.ps1)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = New-Item -ItemType Directory -Path 'tools/sqlite' -Force
          $url = 'https://www.sqlite.org/2024/sqlite-tools-win-x64-3460000.zip'
          $zip = Join-Path $env:RUNNER_TEMP 'sqlite-tools.zip'
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $url -OutFile $zip
          $extract = Join-Path $env:RUNNER_TEMP 'sqlite-extract'
          Expand-Archive -LiteralPath $zip -DestinationPath $extract -Force
          $exe = Join-Path $extract 'sqlite3.exe'
          if (-not (Test-Path $exe)) { throw "sqlite3.exe missing in archive at $exe" }
          Copy-Item $exe (Join-Path $dir.FullName 'sqlite3.exe') -Force
          Write-Host "Staged sqlite3.exe to tools/sqlite/sqlite3.exe"
      - name: cargo test --workspace --tests
        run: cargo test --workspace --tests

  # Story 11.3 — UI snapshot harness (L2). Runs the egui_kittest-based
  # snapshot tests. Budget 30s per T-40. HITL on every snapshot acceptance
  # via `cargo insta accept` (G19). Cited: Story 11.3 DoD, F8.
  ui-snapshots:
    name: "cargo test --test ui_snapshots (L2, T-40 budget: 30s)"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --test ui_snapshots
        run: cargo test --test ui_snapshots

  bench:
    name: "cargo bench (L3, T-40 budget: 600s)"
    runs-on: windows-latest
    timeout-minutes: 20
    # Story 11.1 owns the layer smoke bench. Story 10.1 adds the NFR benches;
    # the same job will run them when they land.
    steps:
      - uses: actions/checkout@v4
      - name: Check for a bench target
        id: bench_exists
        shell: bash
        run: |
          if find crates -path '*/benches/*.rs' -o -path 'benches/*.rs' | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No bench target found — skipping L3 until one is added."
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.bench_exists.outputs.exists == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.bench_exists.outputs.exists == 'true'
      - name: cargo bench --workspace --all-targets
        if: steps.bench_exists.outputs.exists == 'true'
        run: cargo bench --workspace --all-targets
      - name: parse_threshold NFR-1 gate
        if: steps.bench_exists.outputs.exists == 'true' && hashFiles('crates/**/benches/poll_cost.rs') != ''
        run: cargo run -p sidebar-app --bin parse_threshold -- target/criterion 10

  # Story 11.2 — Regression gate: aggregates L0+L1+L3 results, runs
  # cargo-llvm-cov (T-43) for the coverage-delta gate (T-42), and uploads
  # regression-report.md as a CI artifact per PR. The `needs:` chain enforces
  # the full-matrix gate per G25 — this job only runs if every prior layer
  # passed. Cited: Story 11.2 DoD, nfr-thresholds.md T-40/T-41/T-42/T-43.
  regression:
    name: "regression gate + coverage + report (Story 11.2)"
    runs-on: windows-latest
    timeout-minutes: 15
    needs: [lint, unit, integration, ui-snapshots, bench]
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the base branch too so we can compute coverage delta vs main.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov (T-43)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report (lcov + summary)
        shell: bash
        run: |
          cargo llvm-cov --workspace --all-targets --lcov --output-path target/coverage.lcov
          cargo llvm-cov --workspace --all-targets --text 2>&1 | tee target/coverage-summary.txt
      # Story 11.2 / T-42 — Coverage absolute-floor gate. Catches the
      # "coverage dropped below minimum" case even without a main-branch
      # baseline lcov (the delta-vs-main comparison remains HITL-gated per
      # Story 11.2). Floors per nfr-thresholds.md T-42:
      #   domain / sensor ≥ 80% ; adapter / platform ≥ 60% ; app ≥ 40%.
      # We aggregate per-crate line coverage from the lcov file (SF: path,
      # LF: total lines, LH: hit lines) and assert each crate's floor.
      - name: T-42 coverage floor gate
        shell: bash
        run: |
          set -euo pipefail
          awk '
            function floor_for(crate,    prefix) {
              if (crate == "sidebar-domain" || crate == "sidebar-sensor") return 80
              if (crate ~ /^sidebar-adapter/) return 60
              if (crate == "sidebar-platform") return 60
              if (crate == "sidebar-app") return 40
              # Crates not named in T-42 (bandwidth, persistence) are reported
              # but not gated — keeping the floor map aligned to the spec.
              return -1
            }
            /^SF:/ {
              # lcov SF: paths look like .../crates/<crate>/src/...
              path = substr($0, 4)
              n = split(path, parts, "/")
              crate = ""
              for (i = 1; i <= n; i++) {
                if (parts[i] == "crates" && i < n) { crate = parts[i+1]; break }
              }
              # Strip any trailing segment that is not the crate dir name
              # (crate is the directory immediately under crates/).
              cur_crate = crate
              lf = 0; lh = 0
              next
            }
            /^LF:/ { lf += substr($0, 4); next }
            /^LH:/ { lh += substr($0, 4); next }
            /^end_of_record$/ {
              if (cur_crate != "" && lf > 0) {
                total_lf[cur_crate] += lf
                total_lh[cur_crate] += lh
              }
              cur_crate = ""
              lf = 0; lh = 0
              next
            }
            END {
              failed = 0
              print "Crate coverage (T-42 absolute floors):"
              for (c in total_lf) {
                pct = (total_lh[c] * 100.0) / total_lf[c]
                floor = floor_for(c)
                status = "PASS"
                if (floor >= 0 && pct + 0.000001 < floor) { status = "FAIL"; failed = 1 }
                printf "  %-28s %6.2f%%  (floor %d%%)  %s\n", c, pct, (floor >= 0 ? floor : 0), status
              }
              exit (failed ? 1 : 0)
            }
          ' target/coverage.lcov
      - name: Build regression-report.md
        shell: bash
        run: |
          {
            echo "# Regression Report (Story 11.2)"
            echo
            echo "Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "## Layer results"
            echo
            echo "| Layer | Job | Status |"
            echo "|---|---|---|"
            echo "| L0 (unit) | unit | ${{ needs.unit.result }} |"
            echo "| L1 (integration) | integration | ${{ needs.integration.result }} |"
            echo "| L2 (ui-snapshots) | ui-snapshots | ${{ needs.ui-snapshots.result }} |"
            echo "| L3 (bench) | bench | ${{ needs.bench.result }} |"
            echo
            echo "## Coverage summary"
            echo
            echo '```'
            cat target/coverage-summary.txt
            echo '```'
          } > regression-report.md
      - name: Upload regression-report.md artifact
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression-report.md
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: target/coverage.lcov
