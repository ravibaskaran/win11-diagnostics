# Story 0.2 — Continuous Integration gate.
#
# Runs the full L0..L3 regression matrix on every PR + on every push to main.
# Gates: lint (fmt + clippy) → supply-chain checks → unit (L0) →
# integration (L1) → bench (L3).
#
# Cited:
#   - architecture.md §11.4 (CI vs Release separation)
#   - guardrails.md G18/G22/G25
#   - nfr-thresholds.md T-22 (per-layer budgets), T-41 (aggregate ≤750s)
#   - Story 0.2 Technical Context
#
# Egress allowlist per G16: cargo (crates.io), github.com, rustsec advisories.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR — saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Avoid exFAT-style hard-link warnings on self-hosted runners; harmless on
  # github-hosted runners. Match the [profile.dev] setting in Cargo.toml.
  CARGO_INCREMENTAL: "0"

jobs:
  lint:
    name: "lint (fmt + clippy)"
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: "cargo fmt --all -- --check (T-22 budget: 60s)"
        run: cargo fmt --all -- --check
      - uses: Swatinem/rust-cache@v2
      - name: "cargo clippy --workspace --all-targets -- -D warnings (T-22 budget: 180s)"
        run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: "cargo deny (T-32 licenses + T-33 advisories + bans + sources)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Story 0.3 landed deny.toml — this is now a hard gate (was advisory).
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses advisories sources

  audit:
    name: "cargo audit (RUSTSEC advisories)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Story 6.5 — LHM binary integrity gate. Offline-deterministic: validates
  # the committed `resources/LibreHardwareMonitor.exe` against the committed
  # `resources/ohm.sha256` pin via `fetch_ohm.ps1 -CheckOnly`. NO network
  # egress (G16). A hash drift on the bundled binary fails the build. Cited:
  # Story 6.5 DoD, R7 (OHM binary pin), G18 (reproducible builds).
  lhm-hash:
    name: "LHM hash gate (Story 6.5, offline -CheckOnly)"
    runs-on: windows-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Validate bundled LHM against resources/ohm.sha256
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/fetch_ohm.ps1 -CheckOnly

  unit:
    name: "cargo test --workspace --lib (L0, T-40 budget: 60s)"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib

  integration:
    name: "cargo test --workspace --tests (L1, T-40 budget: 60s)"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --tests
        run: cargo test --workspace --tests

  bench:
    name: "cargo bench (L3, T-40 budget: 600s)"
    runs-on: windows-latest
    timeout-minutes: 20
    # Story 11.1 owns the layer smoke bench. Story 10.1 adds the NFR benches;
    # the same job will run them when they land.
    steps:
      - uses: actions/checkout@v4
      - name: Check for a bench target
        id: bench_exists
        shell: bash
        run: |
          if find crates -path '*/benches/*.rs' -o -path 'benches/*.rs' | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No bench target found — skipping L3 until one is added."
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.bench_exists.outputs.exists == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.bench_exists.outputs.exists == 'true'
      - name: cargo bench --workspace --all-targets
        if: steps.bench_exists.outputs.exists == 'true'
        run: cargo bench --workspace --all-targets
      - name: parse_threshold NFR-1 gate
        if: steps.bench_exists.outputs.exists == 'true' && hashFiles('crates/**/benches/poll_cost.rs') != ''
        run: cargo run -p sidebar-app --bin parse_threshold -- target/criterion 10

  # Story 11.2 — Regression gate: aggregates L0+L1+L3 results, runs
  # cargo-llvm-cov (T-43) for the coverage-delta gate (T-42), and uploads
  # regression-report.md as a CI artifact per PR. The `needs:` chain enforces
  # the full-matrix gate per G25 — this job only runs if every prior layer
  # passed. Cited: Story 11.2 DoD, nfr-thresholds.md T-40/T-41/T-42/T-43.
  regression:
    name: "regression gate + coverage + report (Story 11.2)"
    runs-on: windows-latest
    timeout-minutes: 15
    needs: [lint, unit, integration, bench]
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the base branch too so we can compute coverage delta vs main.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov (T-43)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report (lcov + summary)
        shell: bash
        run: |
          cargo llvm-cov --workspace --all-targets --lcov --output-path target/coverage.lcov
          cargo llvm-cov --workspace --all-targets --text 2>&1 | tee target/coverage-summary.txt
      - name: Build regression-report.md
        shell: bash
        run: |
          {
            echo "# Regression Report (Story 11.2)"
            echo
            echo "Generated: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo "## Layer results"
            echo
            echo "| Layer | Job | Status |"
            echo "|---|---|---|"
            echo "| L0 (unit) | unit | ${{ needs.unit.result }} |"
            echo "| L1 (integration) | integration | ${{ needs.integration.result }} |"
            echo "| L3 (bench) | bench | ${{ needs.bench.result }} |"
            echo
            echo "## Coverage summary"
            echo
            echo '```'
            cat target/coverage-summary.txt
            echo '```'
          } > regression-report.md
      - name: Upload regression-report.md artifact
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: regression-report.md
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: target/coverage.lcov
