# Release workflow: build -> stage -> ISCC installer -> portable ZIP -> publish GitHub Release.
#
# Triggered manually via workflow_dispatch with a version input.
#
# v0.1.0 status: UNSIGNED. SignPath Foundation application is pending; this
# workflow ships unsigned artifacts until signing is wired up. SmartScreen
# will show "Windows protected your PC" — the README documents the bypass.
# Re-add the sign: job (see git history pre-v0.1.0) once SignPath is approved.
#
# Stages (single job):
#   1. Build: cargo build --release --target x86_64-pc-windows-msvc
#   2. Fetch pinned LHM runtime + verify SHA-256 (Story 6.5)
#   3. Stage: sidebar.exe + LHM runtime in staging/
#   4. Build installer: ISCC.exe installer/sidebar.iss -> dist/sidebar-setup.exe
#   5. Package portable ZIP: staging/ + README.txt -> sidebar-portable-<version>.zip
#   6. Publish: GitHub Release (draft — HITL review before publishing)
#
# Artifacts attached to the release:
#   - sidebar-setup-<version>.exe   (installer — recommended)
#   - sidebar-portable-<version>.zip (portable build — no installer)

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0 — no leading v)'
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  build-and-publish:
    name: "Build + publish (release, x86_64-pc-windows-msvc)"
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Fetch pinned LHM runtime package
        shell: pwsh
        run: ./scripts/fetch_ohm.ps1

      - name: Verify LHM binary pin (Story 6.5)
        shell: pwsh
        run: ./scripts/fetch_ohm.ps1 -CheckOnly

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          # Rename the binary to the public-facing name. The portable ZIP
          # + installer both ship this as `sidebar.exe`.
          cp target/x86_64-pc-windows-msvc/release/sidebar-app.exe staging/sidebar.exe
          # Ship the complete LHM runtime (managed DLLs, config, locales,
          # license) beside sidebar.exe so Full mode works out of the box.
          cp -R resources/. staging/
          # Include the portable README inside the ZIP (renamed to README.txt).
          cp installer/portable/README.txt staging/README.txt

      - name: Compute sidebar.exe SHA-256
        id: sidebar_hash
        shell: bash
        run: |
          HASH=$(sha256sum staging/sidebar.exe | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "::notice::sidebar.exe SHA-256 is $HASH"

      - name: Build Inno Setup installer (dist/sidebar-setup.exe)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc — windows-latest image changed?"
          }
          & $iscc /DAppVersion=${{ inputs.version }} installer\sidebar.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          $setup = Get-Item dist\sidebar-setup.exe
          Write-Host "Built $($setup.FullName) ($([math]::Round($setup.Length/1MB,2)) MB)"

      - name: Compute installer SHA-256
        id: installer_hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\sidebar-setup.exe -Algorithm SHA256).Hash.ToLower()
          "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "::notice::sidebar-setup.exe SHA-256 is $hash"

      - name: Rename installer for release
        shell: bash
        run: mv dist/sidebar-setup.exe sidebar-setup-${{ inputs.version }}.exe

      - name: Package portable ZIP
        shell: bash
        run: |
          cd staging
          zip -r ../sidebar-portable-${{ inputs.version }}.zip .

      - name: Compute portable ZIP SHA-256
        id: zip_hash
        shell: bash
        run: |
          HASH=$(sha256sum sidebar-portable-${{ inputs.version }}.zip | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            sidebar-setup-${{ inputs.version }}.exe
            sidebar-portable-${{ inputs.version }}.zip
          body: |
            ## Downloads

            - **`sidebar-setup-${{ inputs.version }}.exe`** — recommended for most users. Double-click to install; creates Start Menu + optional desktop shortcuts and an Add/Remove Programs entry.
            - **`sidebar-portable-${{ inputs.version }}.zip`** — portable build (no installer). Unzip anywhere and run `sidebar.exe`. See the bundled `README.txt`.

            ## SHA-256 checksums

            | File | SHA-256 |
            |---|---|
            | `sidebar-setup-${{ inputs.version }}.exe` | `${{ steps.installer_hash.outputs.hash }}` |
            | `sidebar-portable-${{ inputs.version }}.zip` | `${{ steps.zip_hash.outputs.hash }}` |
            | (staged `sidebar.exe` inside the ZIP) | `${{ steps.sidebar_hash.outputs.hash }}` |

            ## Signing status

            **UNSIGNED.** v0.1.0 ships unsigned. Windows SmartScreen will show "Windows protected your PC" on first launch — click **More info → Run anyway**. Code signing via SignPath Foundation is pending and will land in a future release. See [signpath/code-signing-policy.md](signpath/code-signing-policy.md) for the trust posture.

            ## What's new

            See [CHANGELOG.md](CHANGELOG.md) for the full change history.
          draft: true  # HITL review before public visibility — click "Publish release" on the release page
          prerelease: true
