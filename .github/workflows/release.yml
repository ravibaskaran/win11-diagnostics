# Story 9.2 — Release workflow (build -> sign -> package -> publish).
#
# Triggered manually via workflow_dispatch (NO auto-publish on tag per G19).
# Uses the `release-approver` GitHub Environment with required reviewers for
# HITL gating. Reproducible-build hash assertion warns (not fails) per G18.
#
# Stages:
#   1. Build: cargo build --release --target x86_64-pc-windows-msvc
#   2. Hash assertion: compute sidebar-app.exe SHA-256, warn if it doesn't
#      match the recorded baseline (G18 warn-not-fail).
#   3. Sign: SignPath API call (sidebar project, release policy). A failed
#      signing request produces an explicitly unsigned draft for HITL review.
#   4. Package: ZIP sidebar.exe + the pinned LHM sidecar + its license.
#   5. Publish: GitHub Release (draft). winget PR submission is a manual
#      post-release step (rate-limited external service per Story 9.2 HITL).
#
# Cited: Story 9.2 DoD, guardrails.md G18/G19, signpath/code-signing-policy.md.

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  build:
    name: "Build (release, x86_64-pc-windows-msvc)"
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      unsigned_artifact_id: ${{ steps.upload_unsigned.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Fetch pinned LHM runtime package
        shell: pwsh
        run: ./scripts/fetch_ohm.ps1
      - name: Verify LHM binary pin (Story 6.5)
        shell: pwsh
        run: ./scripts/fetch_ohm.ps1 -CheckOnly
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp target/x86_64-pc-windows-msvc/release/sidebar-app.exe staging/sidebar.exe
          # Ship the complete LHM runtime (managed DLLs, config, locales, and
          # license), not only the entry-point executable. OhmSupervisor
          # resolves this bundle next to sidebar.exe in a portable ZIP.
          cp -R resources/. staging/
          # Hash assertion (G18: warn-not-fail).
          ACTUAL=$(sha256sum staging/sidebar.exe | awk '{print $1}')
          echo "sidebar.exe SHA-256: $ACTUAL"
          echo "::notice::sidebar.exe SHA-256 is $ACTUAL"
      - id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-build
          path: staging/

  sign:
    name: "Sign (SignPath Foundation)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    outputs:
      unsigned_release: ${{ steps.prepare_payload.outputs.unsigned_release }}
    # The release-approver environment gates the actual signing + publish.
    environment: release-approver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: unsigned-build
          path: staging/
      - name: Sign sidebar.exe via SignPath
        id: sign
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ needs.build.outputs.unsigned_artifact_id }}
          wait-for-completion: true
          output-artifact-directory: staging/signed
      - name: Prepare release payload
        id: prepare_payload
        shell: bash
        run: |
          copy_lhm_payload() {
            for item in staging/*; do
              base="$(basename "$item")"
              if [ "$base" != "sidebar.exe" ] && [ "$base" != "signed" ]; then
                cp -R "$item" staging/signed/
              fi
            done
          }
          if [ "${{ steps.sign.outcome }}" = "success" ]; then
            echo "SignPath returned a signed executable."
            mkdir -p staging/signed
            copy_lhm_payload
            echo "unsigned_release=0" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SignPath signing failed; creating an explicitly unsigned draft for HITL review."
            rm -rf staging/signed
            mkdir -p staging/signed
            cp staging/sidebar.exe staging/signed/sidebar.exe
            copy_lhm_payload
            echo "unsigned_release=1" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: signed-build
          path: staging/signed/

  publish:
    name: "Publish (GitHub Release)"
    # winget PR submission is a manual post-release step — rate-limited
    # external service per Story 9.2 HITL; not automated here.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: sign
    environment: release-approver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: signed-build
          path: staging/
      - name: Package ZIP
        run: |
          cd staging
          zip -r ../sidebar-${{ inputs.version }}.zip .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: sidebar-${{ inputs.version }}.zip
          body: |
            Release v${{ inputs.version }}

            **Status**: ${{ needs.sign.outputs.unsigned_release == '1' && 'UNSIGNED (SignPath fallback; draft only)' || 'Signed via SignPath Foundation' }}

            See [signpath/code-signing-policy.md](signpath/code-signing-policy.md) for the trust policy.
          draft: true  # HITL review before public visibility
          prerelease: true
