# Dependabot config — keeps Cargo deps + GitHub Actions versions patched.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Cargo dependencies (workspace crates + Cargo.lock).
  # Weekly cadence avoids weekend noise; grouped to land related deps in one PR.
  # Semver-MAJOR bumps are ignored — they need deliberate porting work (API
  # reworks, feature-flag changes, MSRV bumps). Re-enable per-dep when ready
  # by adding it to allow.maintained or removing the ignore block.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Patch + minor updates land together (low-risk; auto-mergeable once CI is
      # green if you enable auto-merge on the PR).
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
    ignore:
      # Don't auto-propose breaking majors (e.g. toml 0.x -> 1.x, thiserror
      # 1.x -> 2.x, rusqlite multi-minor jumps). Track + schedule them in a
      # deliberate upgrade pass after v1.0 instead.
      - dependency-type: "all"
        update-type: "version-update:semver-major"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions versions — workflow action versions (actions/checkout,
  # dtolnay/rust-toolchain, etc.) drift otherwise.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
