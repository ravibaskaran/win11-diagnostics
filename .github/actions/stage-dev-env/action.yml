name: Stage dev-env contract
description: |
  Populate the gitignored dev-side downloads (LHM runtime, sqlite3, cargo
  subcommands, CI tools) so scripts/verify-dev-env.ps1 passes on a fresh
  runner. Used by the `integration` + `regression` CI jobs — both invoke
  the dev_env_scripts tests which call verify-dev-env.ps1.

  Mirrors what CONTRIBUTING.md asks of a contributor + what release.yml
  does for the build stage. Nothing here ships in the repo (all gitignored).

runs:
  using: composite
  steps:
    - name: Fetch pinned LHM runtime
      shell: pwsh
      run: ./scripts/fetch_ohm.ps1

    - name: Stage sqlite3.exe into tools/sqlite/
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $dir = New-Item -ItemType Directory -Path 'tools/sqlite' -Force
        $url = 'https://www.sqlite.org/2024/sqlite-tools-win-x64-3460000.zip'
        $zip = Join-Path $env:RUNNER_TEMP 'sqlite-tools.zip'
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest -Uri $url -OutFile $zip
        $extract = Join-Path $env:RUNNER_TEMP 'sqlite-extract'
        Expand-Archive -LiteralPath $zip -DestinationPath $extract -Force
        $exe = Join-Path $extract 'sqlite3.exe'
        if (-not (Test-Path $exe)) { throw "sqlite3.exe missing in archive at $exe" }
        Copy-Item $exe (Join-Path $dir.FullName 'sqlite3.exe') -Force

    - name: Stage cargo subcommands into tools/cargo-bin/
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p tools/cargo-bin
        # cargo-binstall downloads prebuilt binaries — seconds vs minutes
        # for cargo install (which compiles from source).
        BINSTALL_VERSION="1.15.4"
        curl -LsSf "https://github.com/cargo-bins/cargo-binstall/releases/download/v${BINSTALL_VERSION}/cargo-binstall-x86_64-pc-windows-msvc.zip" -o /tmp/binstall.zip
        unzip -o /tmp/binstall.zip -d /tmp/binstall-extract
        export PATH="/tmp/binstall-extract:$PATH"
        # --install-path <DIR> installs the binary DIRECTLY at <DIR> (no
        # bin/ subdir). Each tool gets its own subdir so binstall doesn't
        # refuse on the second tool ("file already exists").
        for tool in cargo-deny cargo-audit cargo-llvm-cov cargo-nextest; do
          echo "Staging $tool"
          stage_dir="${PWD}/target/cargo-stage-$tool"
          mkdir -p "$stage_dir"
          cargo binstall --no-confirm --quiet --install-path "$stage_dir" "$tool"
          find "$stage_dir" -maxdepth 1 -name 'cargo-*.exe' -exec cp -f {} tools/cargo-bin/ \;
        done
        ls tools/cargo-bin/

    - name: Stage CI tools into tools/ci/ (actionlint, winget-create)
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $dir = New-Item -ItemType Directory -Path 'tools/ci' -Force
        $ProgressPreference = 'SilentlyContinue'
        # actionlint — GitHub Actions linter. URL pattern includes the
        # version twice: actionlint_<ver>_windows_amd64.zip.
        $alVer = '1.7.12'
        $alUrl = "https://github.com/rhysd/actionlint/releases/download/v$alVer/actionlint_${alVer}_windows_amd64.zip"
        $alZip = Join-Path $env:RUNNER_TEMP 'actionlint.zip'
        Invoke-WebRequest -Uri $alUrl -OutFile $alZip
        Expand-Archive -LiteralPath $alZip -DestinationPath $env:RUNNER_TEMP/actionlint-extract -Force
        Copy-Item (Join-Path $env:RUNNER_TEMP 'actionlint-extract/actionlint.exe') (Join-Path $dir.FullName 'actionlint.exe') -Force
        # winget-create — winget manifest authoring (single .exe release)
        $wgUrl = 'https://github.com/microsoft/winget-create/releases/download/v1.9.3.0/wingetcreate.exe'
        Invoke-WebRequest -Uri $wgUrl -OutFile (Join-Path $dir.FullName 'wingetcreate.exe')
        Write-Host "Staged actionlint + wingetcreate to tools/ci/"
