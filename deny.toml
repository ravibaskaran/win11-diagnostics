# Story 0.3 ‚Äî cargo-deny supply-chain policy.
#
# Configures `cargo deny check` which is run as a hard CI gate (Story 0.2
# ci.yml removes `continue-on-error: true` once this file lands). Encodes
# the T-32 license allowlist + T-33 RUSTSEC advisory policy.
#
# Cited: Story 0.3, guardrails.md G3/G18, nfr-thresholds.md T-32/T-33.
#
# Schema note: cargo-deny 0.19 changed the [advisories] schema (PR #611).
# The old `vulnerability`/`unmaintained`/`notice` keys are gone; we use
# the new `version` + `yanked` + `ignore` keys.

[licenses]
# T-32 allowlist. Adding requires architect sign-off (G19).
# Story 8.1 additions: egui/eframe pull in three new transitive licenses:
#   - BSL-1.0 (Boost Software License ‚Äî OSI approved, permissive; NOT the
#     Source-Sensitive BSL). Used by `clipboard-win` + `error-code` via
#     `arboard` ‚Üí `egui-winit` ‚Üí `eframe`.
#   - OFL-1.1 (SIL Open Font License ‚Äî OSI approved, permissive). Used by
#     `epaint_default_fonts` for the bundled Ubuntu fonts.
#   - Ubuntu-font-1.0 (Ubuntu Font Licence ‚Äî permissive, OSI-compatible
#     redistribution). Used alongside OFL-1.1 for the same Ubuntu fonts.
# All three are permissive, OSI-reviewed, and GPL-compatible.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",         # Boost Software License (Story 8.1 ‚Äî clipboard-win, error-code via eframe)
    "OFL-1.1",         # SIL Open Font License (Story 8.1 ‚Äî epaint_default_fonts)
    "Ubuntu-font-1.0", # Ubuntu Font Licence (Story 8.1 ‚Äî epaint_default_fonts)
]
confidence-threshold = 0.93

[bans]
# Warn on multiple major versions (G3/G18 smell, not a hard fail).
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[advisories]
# Always-fail on actual vulnerabilities (T-33). The default behaviour is
# already deny; this makes it explicit.
version = 2
# Yanked crate versions are a hard fail.
yanked = "deny"
# To mute a specific advisory, add its RUSTSEC ID with a comment explaining
# why + an expiry date (T-33 requires both).
ignore = [
    # ttf-parser is unmaintained upstream (RUSTSEC-2026-0192). It is a
    # transitive dep of eframe 0.35 via winit ‚Üí sctk-adwaita ‚Üí ab_glyph ‚Üí
    # owned_ttf_parser ‚Üí ttf-parser; we cannot replace it without forking
    # winit. The advisory is "unmaintained" (no known exploit; the crate
    # still works correctly for egui's font parsing). Recheck when winit
    # publishes a release that swaps ttf-parser for skrifa (the recommended
    # alternative) ‚Äî tracked at https://github.com/rust-windowing/winit.
    "RUSTSEC-2026-0192",  # ttf-parser unmaintained; eframe‚Üíwinit transitive; recheck 2026-10-01

    # quick-xml 0.39 has two DoS advisories (RUSTSEC-2026-0194 quadratic
    # attribute check, RUSTSEC-2026-0195 unbounded namespace allocation).
    # quick-xml is a transitive BUILD-TIME dep of eframe via
    # winit ‚Üí smithay-client-toolkit ‚Üí wayland-scanner, which uses quick-xml
    # ONLY to parse the static Wayland protocol XML files at compile time
    # (build.rs). It is NOT linked into the runtime binary's hot path, and
    # the sidebar targets Windows 11 exclusively (Wayland code is dead on
    # our target). The fix (quick-xml ‚â• 0.41) requires wayland-scanner ‚â• 0.32
    # which requires winit ‚â• 0.31 which requires eframe ‚â• 0.36 ‚Äî out of
    # scope for Story 8.1's pinned egui 0.35. Recheck when eframe publishes
    # a 0.36+ release (tracked at https://github.com/emilk/egui/releases).
    "RUSTSEC-2026-0194",  # quick-xml quad attr check; build-time only; Win11 target; recheck 2026-10-01
    "RUSTSEC-2026-0195",  # quick-xml unbounded ns alloc; build-time only; Win11 target; recheck 2026-10-01
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
